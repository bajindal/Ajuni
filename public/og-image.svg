<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d3d"/>
      <stop offset="50%" stop-color="#2D1078"/>
      <stop offset="100%" stop-color="#0a0420"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C4FE8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C4FE8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8A0FF"/>
      <stop offset="55%" stop-color="#7C4FE8"/>
      <stop offset="100%" stop-color="#5526D4"/>
    </linearGradient>
    <linearGradient id="side" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A2FC8"/>
      <stop offset="100%" stop-color="#2D1078"/>
    </linearGradient>
    <linearGradient id="deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1078"/>
      <stop offset="100%" stop-color="#150640"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="180" r="280" fill="url(#orb1)"/>
  <circle cx="1000" cy="500" r="320" fill="url(#orb2)"/>

  <!-- Eyebrow tag -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="320" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <circle cx="22" cy="19" r="4" fill="#A78BFA"/>
    <text x="38" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#E0D0FF" letter-spacing="0.06em">CONTROL PLANE FOR ENTERPRISE AI AGENTS</text>
  </g>

  <!-- Mark -->
  <g transform="translate(880, 200) scale(2.6)">
    <g transform="rotate(0)">
      <path d="M 0,-12 L -6,-6 L 0,0 L 6,-6 Z" fill="url(#deep)"/>
      <path d="M 0,-46 L -19,-23 L -11,-9 L -6,-6 L 0,-12 Z" fill="url(#side)"/>
      <path d="M 0,-46 L 19,-23 L 11,-9 L 6,-6 L 0,-12 Z" fill="url(#lit)"/>
    </g>
    <g transform="rotate(60)">
      <path d="M 0,-12 L -6,-6 L 0,0 L 6,-6 Z" fill="url(#deep)"/>
      <path d="M 0,-46 L -19,-23 L -11,-9 L -6,-6 L 0,-12 Z" fill="url(#side)"/>
      <path d="M 0,-46 L 19,-23 L 11,-9 L 6,-6 L 0,-12 Z" fill="url(#lit)"/>
    </g>
    <g transform="rotate(120)">
      <path d="M 0,-12 L -6,-6 L 0,0 L 6,-6 Z" fill="url(#deep)"/>
      <path d="M 0,-46 L -19,-23 L -11,-9 L -6,-6 L 0,-12 Z" fill="url(#side)"/>
      <path d="M 0,-46 L 19,-23 L 11,-9 L 6,-6 L 0,-12 Z" fill="url(#lit)"/>
    </g>
    <g transform="rotate(180)">
      <path d="M 0,-12 L -6,-6 L 0,0 L 6,-6 Z" fill="url(#deep)"/>
      <path d="M 0,-46 L -19,-23 L -11,-9 L -6,-6 L 0,-12 Z" fill="url(#side)"/>
      <path d="M 0,-46 L 19,-23 L 11,-9 L 6,-6 L 0,-12 Z" fill="url(#lit)"/>
    </g>
    <g transform="rotate(240)">
      <path d="M 0,-12 L -6,-6 L 0,0 L 6,-6 Z" fill="url(#deep)"/>
      <path d="M 0,-46 L -19,-23 L -11,-9 L -6,-6 L 0,-12 Z" fill="url(#side)"/>
      <path d="M 0,-46 L 19,-23 L 11,-9 L 6,-6 L 0,-12 Z" fill="url(#lit)"/>
    </g>
    <g transform="rotate(300)">
      <path d="M 0,-12 L -6,-6 L 0,0 L 6,-6 Z" fill="url(#deep)"/>
      <path d="M 0,-46 L -19,-23 L -11,-9 L -6,-6 L 0,-12 Z" fill="url(#side)"/>
      <path d="M 0,-46 L 19,-23 L 11,-9 L 6,-6 L 0,-12 Z" fill="url(#lit)"/>
    </g>
  </g>

  <!-- Headline -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">Your team handles strategy.</text>
  <text x="80" y="340" font-family="Inter, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">Ajuni handles operations,</text>
  <text x="80" y="420" font-family="Instrument Serif, serif" font-size="72" font-style="italic" fill="#A78BFA" letter-spacing="-0.012em">end to end.</text>

  <!-- Sub -->
  <text x="80" y="490" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#ffffff" fill-opacity="0.75">Production-ready AI agents for Indian enterprises · 4–8 weeks</text>

  <!-- Footer pills -->
  <g transform="translate(80, 540)" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">
    <g>
      <rect x="0" y="0" width="180" height="36" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="16" y="23">Sovereign deployment</text>
    </g>
    <g transform="translate(196, 0)">
      <rect x="0" y="0" width="160" height="36" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="16" y="23">ISO 27001 · CMMI L5</text>
    </g>
    <g transform="translate(372, 0)">
      <rect x="0" y="0" width="160" height="36" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="16" y="23">11 Indian languages</text>
    </g>
  </g>

  <!-- Wordmark bottom right -->
  <text x="1100" y="585" text-anchor="end" font-family="Instrument Serif, serif" font-size="40" font-style="italic" fill="#ffffff" fill-opacity="0.85">ajuni</text>
  <text x="1100" y="608" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.12em">A WEBORITY PRODUCT</text>
</svg>
